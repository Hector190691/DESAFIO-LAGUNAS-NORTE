<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERVOR CHALLENGE</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Pantalla de Inicio -->
   <div id="inicio" class="pantalla">

    <img src="logo.png" class="logo" alt="PERVOR">

    <h1>🏁 DESAFÍO LAGUNAS NORTE</h1>

   <p class="subtitulo">
    🚗 Campaña de Manejo Defensivo
</p>

    <input
        type="text"
        id="nombre"
        placeholder="Nombres y Apellidos">

    <input
        type="text"
        id="dni"
        placeholder="Número de DNI">

    <input
        type="text"
        id="area"
        placeholder="Área o Frente de Trabajo">

    <button id="btnIniciar">
    🚀 Iniciar Desafío
</button>

</div>


    <!-- Pantalla del Juego -->
    <div id="juego" class="pantalla oculto">

        <div class="barraSuperior">

<div class="progreso">
    <div id="barraProgreso"></div>
</div>

<div id="nivel">
    Pregunta 1 de 10
</div>
            <div id="puntaje">
                Puntaje: 0
            </div>

        </div>

        <div id="pregunta" class="pregunta">
            Aquí aparecerá la pregunta
        </div>

        <div id="opciones" class="opciones">

            <!-- Las respuestas se cargarán automáticamente -->

        </div>

<div id="mensajeRespuesta" class="mensaje oculto">
    <h3 id="tituloMensaje"></h3>
    <p id="textoMensaje"></p>
</div>

        <div class="barraInferior">

            <button id="btnSiguiente">
                Siguiente
            </button>

        </div>

    </div>


    <!-- Pantalla Final -->
    <div id="final" class="pantalla oculto">

        <h2>¡Juego terminado!</h2>

        <p id="resultadoFinal"></p>

        <button id="btnReiniciar">
            Jugar nuevamente
        </button>

    </div>


    <script src="preguntas.js"></script>
    <script src="script.js"></script>

</body>
</html>
